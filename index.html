<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Finder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1 class="header-title">Activity Finder</h1>
      <p class="header-location">Near: <span id="header-location">Manchester</span></p>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="activities-layout">
        <!-- Date Sidebar (desktop) / Date Strip (mobile) -->
        <aside class="date-sidebar">
          <h2 class="date-sidebar-title">Date</h2>
          <div class="date-list" id="date-list">
            <!-- JS-generated date buttons -->
          </div>
        </aside>

        <!-- Main Content -->
        <div class="activities-page">
          <!-- Tab Bar -->
          <div class="tab-bar" role="tablist">
            <button class="tab active" role="tab" data-time-period="" onclick="setActiveTab(this)">All</button>
            <button class="tab" role="tab" data-time-period="morning" onclick="setActiveTab(this)">Morning</button>
            <button class="tab" role="tab" data-time-period="afternoon" onclick="setActiveTab(this)">Afternoon</button>
            <button class="tab" role="tab" data-time-period="evening" onclick="setActiveTab(this)">Evening</button>
            <button class="tab" role="tab" data-time-period="night" onclick="setActiveTab(this)">Night</button>
          </div>

          <!-- Category Filter -->
          <div class="category-filter" id="category-filter">
            <button class="category-pill active" data-category="" onclick="setActiveCategory(this)">All Categories</button>
            <button class="category-pill" data-category="music" onclick="setActiveCategory(this)">&#127925; Music &amp; Live</button>
            <button class="category-pill" data-category="food-drink" onclick="setActiveCategory(this)">&#127869;&#65039; Food &amp; Drink</button>
            <button class="category-pill" data-category="networking" onclick="setActiveCategory(this)">&#128188; Networking</button>
            <button class="category-pill" data-category="arts-culture" onclick="setActiveCategory(this)">&#127912; Arts &amp; Culture</button>
            <button class="category-pill" data-category="social" onclick="setActiveCategory(this)">&#128101; Social &amp; Dating</button>
            <button class="category-pill" data-category="learning" onclick="setActiveCategory(this)">&#128218; Learning</button>
            <button class="category-pill" data-category="sports" onclick="setActiveCategory(this)">&#9917; Sports &amp; Outdoor</button>
            <button class="category-pill" data-category="faith" onclick="setActiveCategory(this)">&#128591; Faith &amp; Spirituality</button>
            <button class="category-pill" data-category="nightlife" onclick="setActiveCategory(this)">&#127881; Parties &amp; Nightlife</button>
            <button class="category-pill" data-category="wellness" onclick="setActiveCategory(this)">&#127973; Wellness</button>
            <button class="category-pill" data-category="other" onclick="setActiveCategory(this)">&#128204; Other</button>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <label class="checkbox-label">
                <input type="checkbox" class="filter-checkbox" id="free-only-checkbox" onchange="onFilterChange()">
                <span>Free only</span>
              </label>
            </div>
          </div>

          <!-- Loading Indicator -->
          <div class="loading-indicator" id="loading">
            <div class="spinner"></div>
            <span>Loading activities...</span>
          </div>

          <!-- Activity List -->
          <div id="activity-list" class="activity-list">
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p id="footer-text">Activity Finder</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
